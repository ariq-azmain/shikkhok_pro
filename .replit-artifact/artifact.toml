kind = "web"
previewPath = "/"
title = "Shikkhok Pro"
version = "1.0.0"
id = "artifacts/shikkhok-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20787

[services.development]
run = "pnpm --filter @workspace/shikkhok-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shikkhok-pro", "run", "build" ]
run = "pnpm --filter @workspace/shikkhok-pro run start"

[services.env]
PORT = "20787"
